<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELORA — Luxury Fashion Store</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'DM Sans'}
body{background:#f7f3ee}

/* NAV */
nav{
  position:fixed; top:0; width:100%;
  display:flex; justify-content:space-between;
  padding:18px 40px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  z-index:10;
}
.logo{font-size:22px;font-weight:700}

.btn{
  padding:10px 16px;
  background:#c9a74e;
  border:none;
  color:white;
  cursor:pointer;
  margin-left:6px;
  border-radius:5px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=1400') center/cover;
  color:white;
  position:relative;
}
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
}
.hero-content{position:relative}

.hero h1{
  font-size:5rem;
  font-family:'Playfair Display';
  opacity:0;
  animation:fadeUp 1s ease forwards;
}
.hero p{
  opacity:0;
  animation:fadeUp 1s ease forwards;
  animation-delay:0.3s;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}

/* CONTROLS */
.controls{padding:30px;text-align:center}
input,select{padding:10px;width:200px;margin:5px}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:40px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  position:relative;
}
.card img{width:100%;height:260px;object-fit:cover}
.price{color:#c9a74e}

/* HEART */
.heart{
  position:absolute;
  top:10px; right:10px;
  background:white;
  border:none;
  cursor:pointer;
  font-size:18px;
  padding:6px 8px;
  border-radius:50%;
}
.heart.active{color:red}

/* PANELS */
.panel{
  position:fixed;
  top:70px;
  right:-420px;
  width:360px;
  height:85vh;
  background:white;
  padding:20px;
  box-shadow:-5px 0 20px rgba(0,0,0,0.2);
  transition:0.4s;
  overflow:auto;
  z-index:20;
}
.panel.active{right:0}

/* BACK BUTTON */
.back{
  margin-bottom:10px;
  background:#333;
  color:white;
  border:none;
  padding:6px 10px;
  cursor:pointer;
}

/* ITEM */
.item{
  display:flex;
  gap:10px;
  margin-bottom:10px;
  border-bottom:1px solid #eee;
  padding-bottom:10px;
}
.item img{
  width:60px;height:60px;
  object-fit:cover;border-radius:5px;
}

/* PAYMENT MODAL */
.payment{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:50;
}
.payment-box{
  background:white;
  padding:20px;
  width:320px;
  border-radius:10px;
}
.payment-box input, .payment-box textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
}
.success{
  text-align:center;
  color:green;
  font-weight:bold;
  margin-top:10px;
}

/* FOOTER */
footer{
  background:#0c0c0c;
  color:white;
  text-align:center;
  padding:40px;
}
footer input{padding:10px;width:220px;margin-top:10px}
</style>
</head>

<body>

<nav>
  <div class="logo">VELORA</div>
  <div>
    <button class="btn" onclick="toggleWish()">Wishlist ❤️</button>
    <button class="btn" onclick="toggleCart()">Cart</button>
  </div>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>Luxury Redefined</h1>
    <p>Crafted elegance for modern icons</p>
  </div>
</section>

<div class="controls">
  <input id="search" placeholder="Search items..." oninput="render()">
  <select onchange="setSort(this.value)">
    <option value="default">Sort</option>
    <option value="low">Price Low → High</option>
    <option value="high">Price High → Low</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<!-- CART -->
<div class="panel" id="cartPanel">
  <button class="back" onclick="toggleCart()">⬅</button>
  <h3>Cart</h3>
  <div id="cart"></div>
  <h4 id="total"></h4>
  <button class="btn" onclick="openPayment()">Checkout</button>
</div>

<!-- WISHLIST -->
<div class="panel" id="wishPanel">
  <button class="back" onclick="toggleWish()">⬅</button>
  <h3>Wishlist ❤️</h3>
  <div id="wish"></div>
</div>

<!-- PAYMENT -->
<div class="payment" id="payment">
  <div class="payment-box">
    <button class="back" onclick="closePayment()">⬅</button>

    <h3>Payment</h3>

    <!-- ✅ ADDED ADDRESS -->
    <textarea placeholder="Enter Delivery Address"></textarea>

    <input placeholder="Card Number">
    <input placeholder="UPI ID">

    <button class="btn" onclick="pay()">Pay Now</button>
    <div id="success" class="success"></div>
  </div>
</div>

<footer>
  <h3>About Velora</h3>
  <p>Velora is a luxury fashion house blending timeless elegance with modern design.</p>

  <br>

  <h3>Stay Updated</h3>
  <input placeholder="Enter email"><br>
  <button class="btn">Subscribe</button>

  <p style="margin-top:20px">© 2026 Velora Luxury Fashion</p>
</footer>

<script>
const API_URL = "http://127.0.0.1:5001";
let products=[], cart=[], wish=[], sortMode="default";

async function init() {
  try {
    const [prodRes, cartRes, wishRes] = await Promise.all([
      fetch(`${API_URL}/products`),
      fetch(`${API_URL}/cart`),
      fetch(`${API_URL}/wishlist`)
    ]);
    products = await prodRes.json();
    cart = await cartRes.json();
    wish = await wishRes.json();
    
    render();
    drawCart();
    drawWish();
  } catch (err) {
    console.error("Failed to initialize:", err);
  }
}

function setSort(v){sortMode=v;render();}

function render(){
 let s=document.getElementById("search").value.toLowerCase();
 let data=[...products];

 if(sortMode==="low") data.sort((a,b)=>a.price-b.price);
 if(sortMode==="high") data.sort((a,b)=>b.price-a.price);

 data=data.filter(p=>p.name.toLowerCase().includes(s));

 document.getElementById("grid").innerHTML=
 data.map(p=>`
 <div class="card">
   <button class="heart ${wish.includes(p.id)?'active':''}" onclick="toggleWishItem(${p.id})">♥</button>
   <img src="${p.img}">
   <h4>${p.name}</h4>
   <p class="price">₹${p.price}</p>
   <button class="btn" onclick="add(${p.id})">Add</button>
   <button class="btn" onclick="buyNow(${p.id})">Buy Now</button>
 </div>
 `).join("");
}

async function add(id){
  await fetch(`${API_URL}/cart/add`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({id: id})
  });
  const res = await fetch(`${API_URL}/cart`);
  cart = await res.json();
  drawCart();
}

async function buyNow(id){
  await fetch(`${API_URL}/cart/replace`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({id: id})
  });
  const res = await fetch(`${API_URL}/cart`);
  cart = await res.json();
  drawCart();
  openPayment();
}

function drawCart(){
 document.getElementById("cart").innerHTML=
 cart.map(c=>`
 <div class="item">
  <img src="${c.img}">
  <div><b>${c.name}</b><br>₹${c.price} x ${c.qty}</div>
 </div>`).join("");

 document.getElementById("total").innerText=
 "Total: ₹"+cart.reduce((a,b)=>a+b.price*b.qty,0);
}

async function toggleWishItem(id){
  await fetch(`${API_URL}/wishlist`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({id: id})
  });
  const res = await fetch(`${API_URL}/wishlist`);
  wish = await res.json();
  drawWish();
  render();
}

function drawWish(){
 document.getElementById("wish").innerHTML=
 wish.map(id=>{
 let p=products.find(x=>x.id==id);
 if (!p) return '';
 return `<div class="item"><img src="${p.img}">
 <div><b>${p.name}</b><br>₹${p.price}</div></div>`;
 }).join("");
}

function toggleCart(){document.getElementById("cartPanel").classList.toggle("active");}
function toggleWish(){document.getElementById("wishPanel").classList.toggle("active");}

function openPayment(){document.getElementById("payment").style.display="flex";}
function closePayment(){document.getElementById("payment").style.display="none";}

async function pay(){
  const address = document.querySelector(".payment-box textarea").value;
  const cardNumber = document.querySelectorAll(".payment-box input")[0].value;
  const upiId = document.querySelectorAll(".payment-box input")[1].value;
  
  try {
    await fetch(`${API_URL}/checkout`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({address, cardNumber, upiId})
    });
    
    document.getElementById("success").innerText="✅ Payment Successful!";
    document.getElementById("success").style.color="green";
    
    setTimeout(()=>{
      document.getElementById("payment").style.display="none";
      document.getElementById("success").innerText="";
      document.querySelector(".payment-box textarea").value="";
      document.querySelectorAll(".payment-box input")[0].value="";
      document.querySelectorAll(".payment-box input")[1].value="";
      cart=[]; 
      drawCart();
    },1500);
  } catch (err) {
    document.getElementById("success").innerText="❌ Payment Failed!";
    document.getElementById("success").style.color="red";
  }
}

// Initialize app
init();
</script>

</body>
</html>
